# MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.duoduocode.service.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置
jwt:
  secret: ${JWT_SECRET:duoduocode-jwt-secret-key-must-be-at-least-256-bits-long}
  expiration: ${JWT_EXPIRATION:86400000}  # 24小时，单位毫秒
  header: Authorization
  prefix: "Bearer "

# 微信小程序配置
wechat:
  mini:
    appid: ${WX_APPID:your-appid-here}
    secret: ${WX_SECRET:your-secret-here}

# 日志配置
logging:
  level:
    com.duoduocode.service: debug
    org.springframework: info
